apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: checkmate
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/checkmate-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: checkmate-secrets
          env:
            - name: STOCKFISH_PATH
              value: /usr/games/stockfish
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "1"
              memory: "1Gi"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: checkmate
spec:
  selector:
    app: backend
  ports:
    - port: 80
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: checkmate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker
  template:
    metadata:
      labels:
        app: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/checkmate-backend:latest
          command: ["celery", "-A", "app.workers.celery_app.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - secretRef:
                name: checkmate-secrets
