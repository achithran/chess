name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install chess sqlalchemy pydantic pydantic-settings structlog "redis>=5" pytest pytest-asyncio
      - name: Compile check
        run: python -m compileall -q app
      - name: Run engine-independent tests
        run: python -m pytest tests/test_chess_logic.py

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type check
        run: npm run typecheck

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t checkmate-backend ./backend
      - name: Build frontend image
        run: docker build -t checkmate-frontend ./frontend
